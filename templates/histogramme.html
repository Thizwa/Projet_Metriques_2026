<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Températures Paris — Google ColumnChart</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 24px;
      background: linear-gradient(180deg, #8ec5fc 0%, #c9e7ff 45%, #e8f4ff 100%);
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }
    #chart { width: 100%; height: 520px; }
    #status { margin-top: 12px; white-space: pre-wrap; }

    .cloud {
      position: fixed;
      background: #ffffff;
      border-radius: 50%;
      opacity: 0.85;
      filter: blur(0.5px);
      z-index: -1;
      animation: drift linear infinite;
    }
    .cloud::before, .cloud::after {
      content: "";
      position: absolute;
      background: #ffffff;
      border-radius: 50%;
    }
    .cloud1 { width: 120px; height: 45px; top: 8%; left: -200px; animation-duration: 60s; }
    .cloud1::before { width: 70px; height: 70px; top: -35px; left: 15px; }
    .cloud1::after { width: 55px; height: 55px; top: -25px; left: 65px; }

    .cloud2 { width: 90px; height: 35px; top: 22%; left: -200px; animation-duration: 80s; animation-delay: -20s; }
    .cloud2::before { width: 55px; height: 55px; top: -28px; left: 10px; }
    .cloud2::after { width: 40px; height: 40px; top: -18px; left: 50px; }

    .cloud3 { width: 140px; height: 50px; top: 65%; left: -250px; animation-duration: 95s; animation-delay: -45s; }
    .cloud3::before { width: 80px; height: 80px; top: -40px; left: 20px; }
    .cloud3::after { width: 60px; height: 60px; top: -28px; left: 75px; }

    @keyframes drift {
      from { transform: translateX(0); }
      to { transform: translateX(calc(100vw + 300px)); }
    }

    h1 { color: #1e3a5f; position: relative; z-index: 1; }
    #chart, #status { position: relative; z-index: 1; }
  </style>
</head>

<body>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>

  <h1>Histogramme des températures — Paris</h1>
  <div id="chart"></div>
  <div id="status"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    let cachedRows = null;

    async function init() {
      try {
        const rows = await fetchParisData();
        cachedRows = rows;
        drawChart(rows);

        window.addEventListener('resize', () => {
          if (cachedRows) drawChart(cachedRows);
        });
      } catch (err) {
        showStatus("Erreur: " + (err?.message || err));
        console.error(err);
      }
    }

    async function fetchParisData() {
      const res = await fetch('/paris', { headers: { 'Accept': 'application/json' } });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status} sur /paris`);
      }

      const json = await res.json();

      const rows = json.map(p => {
        const dt = toDate(p.datetime);
        const temp = Number(p.temperature_c);
        return [dt, temp];
      });

      rows.sort((a, b) => a[0] - b[0]);

      return rows;
    }

    function toDate(isoLike) {
      const [datePart, timePart] = isoLike.split('T');
      const [y, m, d] = datePart.split('-').map(Number);
      const [hh, mm] = timePart.split(':').map(Number);
      return new Date(y, m - 1, d, hh, mm, 0);
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn('datetime', 'Date/Heure');
      data.addColumn('number', 'Température (°C)');
      data.addRows(rows);

      const options = {
        title: 'Histogramme des températures à Paris (horaire)',
        legend: { position: 'bottom' },
        hAxis: {
          title: 'Date/Heure',
          format: 'dd/MM HH:mm'
        },
        vAxis: {
          title: '°C'
        }
      };

      const chart = new google.visualization.ColumnChart(document.getElementById('chart'));
      chart.draw(data, options);

      showStatus(`OK — ${rows.length} points chargés depuis /paris`);
    }

    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
