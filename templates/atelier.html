<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pression atmosphérique Porto — Google AreaChart</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 24px;
      background: linear-gradient(135deg, #0a2342, #1c4e80 55%, #001220);
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }
    #chart { width: 100%; height: 520px; background: #f0f6fb; border-radius: 12px; padding: 8px; }
    #status { margin-top: 12px; white-space: pre-wrap; color: #aed3f0; }

    .particle {
      position: fixed;
      top: -20px;
      border-radius: 50%;
      background: rgba(173, 216, 255, 0.55);
      box-shadow: 0 0 8px rgba(173, 216, 255, 0.5);
      animation: fall linear infinite;
      z-index: 0;
    }

    @keyframes fall {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.4; }
      100% { transform: translateY(110vh) translateX(-15px); opacity: 0; }
    }

    .p1 { left: 5%;  width: 5px;  height: 5px;  animation-duration: 17s; animation-delay: 0s; }
    .p2 { left: 15%; width: 7px;  height: 7px;  animation-duration: 21s; animation-delay: -6s; }
    .p3 { left: 26%; width: 4px;  height: 4px;  animation-duration: 15s; animation-delay: -10s; }
    .p4 { left: 38%; width: 6px;  height: 6px;  animation-duration: 23s; animation-delay: -4s; }
    .p5 { left: 52%; width: 5px;  height: 5px;  animation-duration: 19s; animation-delay: -12s; }
    .p6 { left: 65%; width: 7px;  height: 7px;  animation-duration: 25s; animation-delay: -8s; }
    .p7 { left: 78%; width: 4px;  height: 4px;  animation-duration: 18s; animation-delay: -15s; }
    .p8 { left: 90%; width: 6px;  height: 6px;  animation-duration: 22s; animation-delay: -5s; }

    h1 { color: #cfe6fa; position: relative; z-index: 1; font-weight: 600; }
    p.subtitle { color: #9fc4e3; position: relative; z-index: 1; margin-top: -8px; }
    #chart, #status { position: relative; z-index: 1; }
  </style>
</head>

<body>
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <div class="particle p7"></div>
  <div class="particle p8"></div>

  <h1>Pression atmosphérique horaire — Porto</h1>
  <p class="subtitle">Atelier final · Donnée : pression au niveau de la mer · Graphique : aire (AreaChart)</p>
  <div id="chart"></div>
  <div id="status"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    let cachedRows = null;

    async function init() {
      try {
        const rows = await fetchPortoData();
        cachedRows = rows;
        drawChart(rows);

        window.addEventListener('resize', () => {
          if (cachedRows) drawChart(cachedRows);
        });
      } catch (err) {
        showStatus("Erreur: " + (err?.message || err));
        console.error(err);
      }
    }

    async function fetchPortoData() {
      const res = await fetch('/portoPression', { headers: { 'Accept': 'application/json' } });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status} sur /portoPression`);
      }

      const json = await res.json();

      const rows = json.map(p => {
        const dt = toDate(p.datetime);
        const pressure = Number(p.pressure_hpa);
        return [dt, pressure];
      });

      rows.sort((a, b) => a[0] - b[0]);

      return rows;
    }

    function toDate(isoLike) {
      const [datePart, timePart] = isoLike.split('T');
      const [y, m, d] = datePart.split('-').map(Number);
      const [hh, mm] = timePart.split(':').map(Number);
      return new Date(y, m - 1, d, hh, mm, 0);
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn('datetime', 'Date/Heure');
      data.addColumn('number', 'Pression (hPa)');
      data.addRows(rows);

      const options = {
        title: 'Pression atmosphérique à Porto (horaire)',
        titleTextStyle: { color: '#0a2342', fontSize: 18, fontName: 'Georgia', bold: true },
        backgroundColor: { fill: '#f0f6fb' },
        chartArea: { backgroundColor: '#f0f6fb', left: 60, right: 30, top: 60, bottom: 60 },
        legend: { position: 'bottom', textStyle: { color: '#2c5a7c', fontSize: 12 } },
        colors: ['#1c4e80'],
        areaOpacity: 0.35,
        hAxis: {
          title: 'Date/Heure',
          titleTextStyle: { color: '#4a7fa3', italic: true },
          textStyle: { color: '#4a7fa3' },
          format: 'dd/MM HH:mm',
          gridlines: { color: '#dceaf4' }
        },
        vAxis: {
          title: 'hPa',
          titleTextStyle: { color: '#4a7fa3', italic: true },
          textStyle: { color: '#4a7fa3' },
          gridlines: { color: '#dceaf4' }
        }
      };

      const chart = new google.visualization.AreaChart(document.getElementById('chart'));
      chart.draw(data, options);

      showStatus(`OK — ${rows.length} points chargés depuis /portoPression`);
    }

    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
