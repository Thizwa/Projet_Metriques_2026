<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Atelier Métriques</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #1f2937, #334155 60%, #0f172a);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .particle {
      position: fixed;
      bottom: -20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.55);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
      animation: rise linear infinite;
      z-index: 0;
    }

    @keyframes rise {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-110vh) translateX(20px); opacity: 0; }
    }

    .p1 { left: 8%;  width: 6px;  height: 6px;  animation-duration: 14s; animation-delay: 0s; }
    .p2 { left: 18%; width: 4px;  height: 4px;  animation-duration: 18s; animation-delay: -4s; }
    .p3 { left: 30%; width: 8px;  height: 8px;  animation-duration: 12s; animation-delay: -8s; }
    .p4 { left: 45%; width: 5px;  height: 5px;  animation-duration: 20s; animation-delay: -2s; }
    .p5 { left: 60%; width: 7px;  height: 7px;  animation-duration: 16s; animation-delay: -10s; }
    .p6 { left: 72%; width: 4px;  height: 4px;  animation-duration: 22s; animation-delay: -6s; }
    .p7 { left: 84%; width: 6px;  height: 6px;  animation-duration: 15s; animation-delay: -12s; }
    .p8 { left: 93%; width: 5px;  height: 5px;  animation-duration: 19s; animation-delay: -3s; }

    .card {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      width: 100%;
      max-width: 420px;
      padding: 36px 32px;
    }

    .card h1 {
      margin: 0 0 6px;
      font-size: 24px;
      color: #1f2937;
    }

    .card p.subtitle {
      margin: 0 0 28px;
      color: #6b7280;
      font-size: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .row > div {
      flex: 1;
    }

    button {
      margin-top: 26px;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: #4338ca;
    }

    #feedback {
      margin-top: 16px;
      font-size: 13px;
      color: #16a34a;
      text-align: center;
      display: none;
    }
  </style>
</head>

<body>
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <div class="particle p7"></div>
  <div class="particle p8"></div>

  <div class="card">
    <h1>Contactez-moi</h1>
    <p class="subtitle">Une question sur l'atelier métriques ? Écrivez-moi un message ci-dessous.</p>

    <form id="contactForm">
      <div class="row">
        <div>
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" placeholder="Votre nom" required />
        </div>
        <div>
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required />
        </div>
      </div>

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Écrivez votre message ici..." required></textarea>

      <button type="submit">Envoyer le message</button>
      <p id="feedback">Merci, votre message a bien été pris en compte (simulation).</p>
    </form>
  </div>

  <script>
    document.getElementById("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();
      document.getElementById("feedback").style.display = "block";
    });
  </script>
</body>
</html>
