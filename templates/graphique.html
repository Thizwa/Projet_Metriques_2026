<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Températures Paris — Google LineChart</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 24px;
      background: linear-gradient(135deg, #0d1b2a, #1b3a5c 55%, #0a0e1a);
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }
    #chart { width: 100%; height: 520px; background: #fdfaf3; border-radius: 12px; padding: 8px; }
    #status { margin-top: 12px; white-space: pre-wrap; color: #d4b88a; }

    .particle {
      position: fixed;
      bottom: -20px;
      border-radius: 50%;
      background: rgba(255, 215, 130, 0.6);
      box-shadow: 0 0 8px rgba(255, 215, 130, 0.5);
      animation: rise linear infinite;
      z-index: 0;
    }

    @keyframes rise {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-110vh) translateX(20px); opacity: 0; }
    }

    .p1 { left: 6%;  width: 5px;  height: 5px;  animation-duration: 16s; animation-delay: 0s; }
    .p2 { left: 16%; width: 7px;  height: 7px;  animation-duration: 20s; animation-delay: -5s; }
    .p3 { left: 27%; width: 4px;  height: 4px;  animation-duration: 14s; animation-delay: -9s; }
    .p4 { left: 40%; width: 6px;  height: 6px;  animation-duration: 22s; animation-delay: -3s; }
    .p5 { left: 55%; width: 5px;  height: 5px;  animation-duration: 18s; animation-delay: -11s; }
    .p6 { left: 68%; width: 7px;  height: 7px;  animation-duration: 24s; animation-delay: -7s; }
    .p7 { left: 80%; width: 4px;  height: 4px;  animation-duration: 17s; animation-delay: -14s; }
    .p8 { left: 92%; width: 6px;  height: 6px;  animation-duration: 21s; animation-delay: -4s; }

    h1 { color: #f0d9a8; position: relative; z-index: 1; font-weight: 600; }
    #chart, #status { position: relative; z-index: 1; }
  </style>
</head>

<body>
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <div class="particle p7"></div>
  <div class="particle p8"></div>

  <h1>Températures horaires — Paris</h1>
  <div id="chart"></div>
  <div id="status"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    let cachedRows = null;

    async function init() {
      try {
        const rows = await fetchParisData();
        cachedRows = rows;
        drawChart(rows);

        window.addEventListener('resize', () => {
          if (cachedRows) drawChart(cachedRows);
        });
      } catch (err) {
        showStatus("Erreur: " + (err?.message || err));
        console.error(err);
      }
    }

    async function fetchParisData() {
      const res = await fetch('/paris', { headers: { 'Accept': 'application/json' } });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status} sur /paris`);
      }

      const json = await res.json();

      const rows = json.map(p => {
        const dt = toDate(p.datetime);
        const temp = Number(p.temperature_c);
        return [dt, temp];
      });

      rows.sort((a, b) => a[0] - b[0]);

      return rows;
    }

    function toDate(isoLike) {
      const [datePart, timePart] = isoLike.split('T');
      const [y, m, d] = datePart.split('-').map(Number);
      const [hh, mm] = timePart.split(':').map(Number);
      return new Date(y, m - 1, d, hh, mm, 0);
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn('datetime', 'Date/Heure');
      data.addColumn('number', 'Température (°C)');
      data.addRows(rows);

      const options = {
        title: 'Température à Paris (horaire)',
        titleTextStyle: { color: '#1b3a5c', fontSize: 18, fontName: 'Georgia', bold: true },
        backgroundColor: { fill: '#fdfaf3' },
        chartArea: { backgroundColor: '#fdfaf3', left: 60, right: 30, top: 60, bottom: 60 },
        legend: { position: 'bottom', textStyle: { color: '#5c4a2e', fontSize: 12 } },
        colors: ['#c9941f'],
        lineWidth: 3,
        pointSize: 4,
        pointShape: 'circle',
        hAxis: {
          title: 'Date/Heure',
          titleTextStyle: { color: '#7a6a4f', italic: true },
          textStyle: { color: '#7a6a4f' },
          format: 'dd/MM HH:mm',
          gridlines: { color: '#ece4d3' }
        },
        vAxis: {
          title: '°C',
          titleTextStyle: { color: '#7a6a4f', italic: true },
          textStyle: { color: '#7a6a4f' },
          gridlines: { color: '#ece4d3' }
        },
        explorer: { actions: ['dragToZoom', 'rightClickToReset'] }
      };

      const chart = new google.visualization.LineChart(document.getElementById('chart'));
      chart.draw(data, options);

      showStatus(`OK — ${rows.length} points chargés depuis /paris`);
    }

    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
